# Sitio estático, sin paso de build. Se publica la raíz del repo tal cual.
[build]
  publish = "."
  command = ""

# Funciones serverless (correos de auth por Resend, marca Dreamtec).
[functions]
  directory = "netlify/functions"

# Cabeceras básicas
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
