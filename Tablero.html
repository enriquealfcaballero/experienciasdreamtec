<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablero Operativo · Eventos Dreamtec</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* === Tablero Operativo — Eventos === */
:root {
  --bg:        oklch(0.985 0.005 80);
  --bg-card:   oklch(1 0 0);
  --bg-soft:   oklch(0.972 0.005 80);
  --ink:       oklch(0.22 0.02 260);
  --ink-soft:  oklch(0.42 0.02 260);
  --ink-mute:  oklch(0.62 0.02 260);
  --line:      oklch(0.90 0.01 260);
  --line-soft: oklch(0.94 0.008 260);
  --accent:    oklch(0.55 0.13 264);
  --crit:      oklch(0.55 0.18 25);
  --warn:      oklch(0.65 0.16 60);
  --ok:        oklch(0.55 0.13 150);
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 14px;
  --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
button, input, textarea, select { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
#root { width: 100%; }
.app { max-width: 1440px; margin: 0 auto; padding: 24px 32px 48px; }

/* === Top bar === */
.topbar { display: flex; align-items: center; gap: 16px; padding-bottom: 18px; margin-bottom: 24px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
.tb-logo { height: 24px; width: auto; opacity: 0.9; }
.tb-div { width: 1px; height: 20px; background: var(--line); }
.tb-tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute); }
.tb-spacer { flex: 1; }
.tb-conn { display: inline-flex; align-items: center; gap: 7px; padding: 5px 11px; border-radius: 100px; border: 1px solid var(--line); background: var(--bg-card); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute); }
.tb-conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-mute); }
.tb-conn.live .tb-conn-dot { background: var(--ok); box-shadow: 0 0 0 3px oklch(0.55 0.13 150 / 0.18); }
.tb-conn.saving .tb-conn-dot { background: var(--warn); }
.tb-conn.error { color: var(--crit); border-color: oklch(0.85 0.07 25); }
.tb-conn.error .tb-conn-dot { background: var(--crit); }

/* User box */
.user-box { display: inline-flex; align-items: center; gap: 10px; padding: 4px 5px 4px 14px; border: 1px solid var(--line); border-radius: 100px; background: var(--bg-card); }
.user-name { font-weight: 600; font-size: 12.5px; }
.user-area { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-mute); }
.user-adm { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 100px; }
.user-out { border: 1px solid var(--line); background: var(--bg-soft); border-radius: 100px; padding: 5px 12px; cursor: pointer; font-size: 12px; }
.user-out:hover { border-color: var(--ink-mute); }

/* === Nav button (Tablero → Gantt) === */
.nav-cta { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px 10px 12px; border-radius: 10px; background: var(--ink); color: var(--bg-card); text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 0.01em; border: 1px solid var(--ink); box-shadow: 0 1px 0 oklch(1 0 0 / 0.08) inset, 0 1px 2px oklch(0 0 0 / 0.10), 0 4px 12px oklch(0 0 0 / 0.06); transition: transform .12s ease, box-shadow .18s ease, background .18s ease; white-space: nowrap; }
.nav-cta:hover { background: oklch(0.30 0.02 260); transform: translateY(-1px); color: var(--bg-card); text-decoration: none; }
.nav-cta-icon { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; background: oklch(1 0 0 / 0.08); border-radius: 7px; flex-shrink: 0; }
.nav-cta-icon svg { width: 16px; height: 16px; stroke: currentColor; }
.nav-cta-text { display: inline-flex; flex-direction: column; line-height: 1.15; gap: 2px; }
.nav-cta-eye { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.10em; text-transform: uppercase; color: oklch(1 0 0 / 0.55); font-weight: 500; }
.nav-cta-label { font-size: 13.5px; font-weight: 600; }
.nav-cta-arrow { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; margin-left: 2px; opacity: 0.7; transition: transform .18s ease, opacity .18s ease; }
.nav-cta:hover .nav-cta-arrow { transform: translateX(3px); opacity: 1; }
.nav-cta-arrow svg { width: 14px; height: 14px; stroke: currentColor; }

/* === Page header === */
.ph { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
.ph-l { flex: 1; }
.ph-eye { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px; }
.ph-title { font-size: 28px; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 6px; }
.ph-sub { font-size: 13.5px; color: var(--ink-soft); max-width: 720px; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--r-md); border: 1px solid var(--line); background: var(--bg-card); cursor: pointer; font-weight: 500; transition: border-color .15s, background .15s; }
.btn:hover { border-color: var(--ink-mute); background: var(--bg-soft); }
.btn-primary { background: var(--ink); color: var(--bg-card); border-color: var(--ink); }
.btn-primary:hover { background: oklch(0.30 0.02 260); border-color: oklch(0.30 0.02 260); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg-soft); border-color: var(--line); }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }

/* === Events list === */
.evts { display: grid; gap: 12px; }
.evt-empty { border: 2px dashed var(--line); border-radius: var(--r-md); padding: 48px 24px; text-align: center; background: var(--bg-card); }
.evt-empty-h { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.evt-empty-p { color: var(--ink-soft); font-size: 13.5px; max-width: 460px; margin: 0 auto 18px; }
.evt-card { display: grid; grid-template-columns: auto 1fr auto auto; gap: 20px; align-items: center; padding: 18px 20px; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); cursor: pointer; transition: border-color .15s, transform .12s; text-align: left; width: 100%; position: relative; }
.evt-card:hover { border-color: var(--ink-mute); transform: translateY(-1px); }
.evt-card:hover .evt-card-del { opacity: 1; }
.evt-card-del { opacity: 0; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line); background: var(--bg-card); color: var(--ink-mute); cursor: pointer; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; padding: 0; }
.evt-card-del:hover { background: oklch(0.96 0.04 25); border-color: oklch(0.85 0.07 25); color: var(--crit); }
.evt-card-date { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 64px; padding: 8px 10px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r-sm); }
.evt-card-date-d { font-size: 22px; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
.evt-card-date-m { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }
.evt-card-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.evt-card-top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.evt-card-title { font-size: 15.5px; font-weight: 600; margin: 0; }
.evt-card-client { font-size: 12.5px; color: var(--ink-mute); font-family: var(--font-mono); letter-spacing: 0.02em; }
.evt-card-meta { display: flex; gap: 14px; font-size: 11.5px; color: var(--ink-mute); font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; }
.evt-card-meta span { display: inline-flex; align-items: center; gap: 4px; }
.evt-card-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 140px; }
.evt-card-pct { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.evt-card-pct-l { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); }
.evt-card-bar { width: 130px; height: 4px; background: var(--line-soft); border-radius: 2px; overflow: hidden; }
.evt-card-bar-fill { height: 100%; background: var(--accent); transition: width .3s; }
.evt-card-bar-fill.ok { background: var(--ok); }
.evt-card-bar-fill.crit { background: var(--crit); }
.evt-card-badge { font-family: var(--font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; border: 1px solid var(--line); background: var(--bg-soft); color: var(--ink-mute); }
.evt-card-badge.crit { color: var(--crit); background: oklch(0.96 0.04 25); border-color: oklch(0.88 0.06 25); }
.evt-card-badge.warn { color: oklch(0.40 0.13 60); background: oklch(0.96 0.04 60); border-color: oklch(0.88 0.06 60); }
.evt-card-badge.ok { color: oklch(0.30 0.13 150); background: oklch(0.95 0.04 150); border-color: oklch(0.85 0.06 150); }

/* === New event form === */
.form { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 24px; max-width: 720px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; margin-bottom: 18px; }
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row.full { grid-column: 1 / -1; }
.form-row label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute); }
.form-row input, .form-row textarea, .form-row select { padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg-card); font-size: 13.5px; transition: border-color .15s; }
.form-row input:focus, .form-row textarea:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
.form-row textarea { resize: vertical; min-height: 64px; font-family: inherit; }
.form-pay { display: flex; gap: 8px; }
.form-pay-opt { flex: 1; padding: 10px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .15s; }
.form-pay-opt:hover { border-color: var(--ink-mute); }
.form-pay-opt.on { border-color: var(--ink); background: var(--ink); color: var(--bg-card); }
.form-pay-opt-r { width: 14px; height: 14px; border: 1.5px solid currentColor; border-radius: 50%; position: relative; flex-shrink: 0; }
.form-pay-opt.on .form-pay-opt-r::after { content: ''; position: absolute; inset: 3px; background: currentColor; border-radius: 50%; }
.form-foot { display: flex; gap: 10px; justify-content: flex-end; padding-top: 16px; border-top: 1px solid var(--line-soft); }

/* === Event detail === */
.detail-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.crumb { font-size: 12.5px; color: var(--ink-mute); }
.crumb-cur { color: var(--ink); font-weight: 500; }
.evt-hd { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; margin-bottom: 18px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
.evt-hd-l { min-width: 0; }
.evt-hd-eye { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px; }
.evt-hd-title { margin: 0 0 8px; font-size: 26px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }
.evt-hd-client { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-soft); }
.evt-hd-meta { display: flex; gap: 18px; margin-top: 12px; font-size: 12px; color: var(--ink-mute); font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; flex-wrap: wrap; }
.evt-hd-meta span strong { color: var(--ink); font-weight: 600; }
.evt-hd-r { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.evt-countdown { display: flex; align-items: baseline; gap: 8px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); }
.evt-countdown-n { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.evt-countdown-l { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); }
.evt-countdown.crit { background: oklch(0.96 0.04 25); border-color: oklch(0.85 0.06 25); }
.evt-countdown.crit .evt-countdown-n { color: var(--crit); }
.alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.alert { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--r-md); border: 1px solid; font-size: 13px; }
.alert.crit { background: oklch(0.96 0.04 25); border-color: oklch(0.85 0.07 25); color: oklch(0.30 0.13 25); }
.alert.warn { background: oklch(0.96 0.04 60); border-color: oklch(0.85 0.07 60); color: oklch(0.34 0.13 60); }
.alert-icon { font-family: var(--font-mono); font-weight: 700; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; background: currentColor; }
.alert-icon span { color: var(--bg-card); font-size: 11px; }
.alert strong { font-weight: 600; }
.prog { display: grid; grid-template-columns: auto 1fr; gap: 16px 20px; align-items: center; padding: 14px 18px; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 18px; }
.prog-pct { display: flex; flex-direction: column; align-items: center; padding-right: 18px; border-right: 1px solid var(--line); }
.prog-pct-n { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.prog-pct-l { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }
.prog-areas { display: flex; flex-wrap: wrap; gap: 8px 14px; }
.prog-area { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.prog-area-dot { width: 8px; height: 8px; border-radius: 50%; }
.prog-area-name { color: var(--ink-soft); font-weight: 500; }
.prog-area-bar { width: 60px; height: 4px; background: var(--line-soft); border-radius: 2px; overflow: hidden; }
.prog-area-bar-fill { height: 100%; transition: width .3s; }
.prog-area-frac { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-mute); font-variant-numeric: tabular-nums; }
.stages { display: flex; flex-direction: column; gap: 14px; }
.stg { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; }
.stg-hd { display: grid; grid-template-columns: auto 1fr auto auto; gap: 16px; align-items: center; padding: 14px 18px; cursor: pointer; user-select: none; }
.stg-hd:hover { background: var(--bg-soft); }
.stg-n { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--ink-mute); width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 50%; }
.stg-titles { display: flex; flex-direction: column; gap: 1px; }
.stg-title { font-size: 14.5px; font-weight: 600; letter-spacing: -0.005em; }
.stg-sub { font-size: 11.5px; color: var(--ink-mute); }
.stg-prog { display: flex; align-items: center; gap: 10px; }
.stg-prog-frac { font-family: var(--font-mono); font-size: 11.5px; font-variant-numeric: tabular-nums; color: var(--ink-soft); }
.stg-prog-bar { width: 80px; height: 4px; background: var(--line-soft); border-radius: 2px; overflow: hidden; }
.stg-prog-bar-fill { height: 100%; background: var(--accent); transition: width .3s; }
.stg-prog-bar-fill.done { background: var(--ok); }
.stg-chev { font-family: var(--font-mono); font-size: 14px; color: var(--ink-mute); transition: transform .15s; }
.stg.open .stg-chev { transform: rotate(90deg); }
.stg-body { border-top: 1px solid var(--line); padding: 4px 0; display: none; }
.stg.open .stg-body { display: block; }
.tsk { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: flex-start; padding: 12px 18px; border-bottom: 1px solid var(--line-soft); transition: background .12s; }
.tsk:last-child { border-bottom: 0; }
.tsk:hover { background: var(--bg-soft); }
.tsk.done .tsk-label { color: var(--ink-mute); text-decoration: line-through; text-decoration-color: oklch(0.85 0.01 260); }
.tsk-check { width: 20px; height: 20px; border: 1.5px solid var(--ink-mute); border-radius: var(--r-sm); background: var(--bg-card); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all .15s; padding: 0; }
.tsk-check:hover { border-color: var(--ink); }
.tsk-check.on { background: var(--ok); border-color: var(--ok); }
.tsk-check.on::after { content: '✓'; color: var(--bg-card); font-size: 13px; font-weight: 700; line-height: 1; }
.tsk-check.locked, .tsk-check.area-locked { opacity: 0.4; cursor: not-allowed; }
.tsk-check.locked:hover, .tsk-check.area-locked:hover { border-color: var(--ink-mute); }
.tsk-body { min-width: 0; }
.tsk-top { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 3px; }
.tsk-label { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.tsk-area { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-mute); }
.tsk-area-dot { width: 6px; height: 6px; border-radius: 50%; }
.tsk-area.mine { color: var(--accent); font-weight: 600; }
.tsk-desc { font-size: 12px; color: var(--ink-soft); margin-top: 2px; line-height: 1.5; }
.tsk-meta { display: flex; gap: 14px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
.tsk-meta-item { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--ink-mute); display: inline-flex; align-items: center; gap: 5px; }
.tsk-meta-item.late { color: var(--crit); font-weight: 600; }
.tsk-meta-item.now { color: oklch(0.40 0.13 60); font-weight: 600; }
.tsk-marker { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; min-width: 150px; text-align: right; }
.tsk-marker-by { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-soft); font-weight: 600; letter-spacing: 0.02em; word-break: break-all; }
.tsk-marker-when { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); }
.tsk-marker-undo { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); cursor: pointer; background: none; border: 0; padding: 2px 6px; border-radius: 3px; margin-top: 2px; }
.tsk-marker-undo:hover { background: var(--bg-soft); color: var(--ink); }
.tsk-day { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; background: var(--bg-soft); border: 1px solid var(--line-soft); color: var(--ink-soft); }
.stg-empty { padding: 16px 18px; font-size: 12.5px; color: var(--ink-mute); font-style: italic; }
/* Filtro por área */
.area-filter { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 0 0 16px; }
.area-filter-l { font-size: 12px; color: var(--ink-mute); font-weight: 600; margin-right: 2px; }
.area-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); background: var(--bg-card); border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: all .12s; }
.area-chip:hover { border-color: var(--accent); color: var(--ink); }
.area-chip.on { background: var(--ink); color: var(--bg-card); border-color: var(--ink); }
.area-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* Adjuntos por tarea */
.tsk-attach { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 9px; }
.att-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-soft); border: 1px solid var(--line-soft); border-radius: 6px; padding: 2px 4px 2px 8px; max-width: 100%; }
.att-name { background: none; border: 0; cursor: pointer; font-size: 11.5px; color: var(--ink-soft); padding: 2px 2px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.att-name:hover { color: var(--accent); text-decoration: underline; }
.att-x { background: none; border: 0; cursor: pointer; color: var(--ink-mute); font-size: 14px; line-height: 1; padding: 0 4px; border-radius: 3px; }
.att-x:hover { color: var(--crit); background: var(--bg-card); }
.att-add { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 600; color: var(--accent); border: 1px dashed var(--accent); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
.att-add:hover { background: var(--bg-soft); }
/* Subida del formulario Excel */
.form-file { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; padding: 16px 18px; margin-bottom: 16px; border: 1.5px dashed var(--line); border-radius: var(--r-sm); background: var(--bg-soft); }
.form-file.ok { border-style: solid; border-color: oklch(0.75 0.12 150); background: oklch(0.97 0.03 150); }
.form-file-main { display: flex; align-items: center; gap: 12px; }
.form-file-ic { font-size: 22px; }
.form-file-t { font-weight: 700; font-size: 13.5px; color: var(--ink); }
.form-file-s { font-size: 12px; color: var(--ink-mute); margin-top: 2px; max-width: 460px; }
.form-preview, .evt-form { margin-bottom: 16px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg-card); overflow: hidden; }
.form-preview > summary, .evt-form > summary { cursor: pointer; padding: 12px 16px; font-weight: 600; font-size: 13px; color: var(--ink-soft); user-select: none; }
.form-preview > summary:hover, .evt-form > summary:hover { background: var(--bg-soft); }
.form-preview-fam, .evt-form-body .form-preview-fam { padding: 8px 16px 12px; border-top: 1px solid var(--line-soft); }
.form-preview-fam-t { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.form-preview-row { display: flex; gap: 12px; padding: 4px 0; font-size: 12.5px; border-bottom: 1px dotted var(--line-soft); }
.form-preview-row:last-child { border-bottom: 0; }
.form-preview-q { flex: 1; color: var(--ink-soft); }
.form-preview-a { flex: 1; color: var(--ink); font-weight: 600; }
.loading-wrap { display: flex; align-items: center; gap: 12px; max-width: 1440px; margin: 80px auto; padding: 0 32px; color: var(--ink-mute); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
.spin { width: 22px; height: 22px; border: 2.5px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Dashboard */
.seg { display: inline-flex; gap: 2px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; padding: 3px; }
.seg button { border: 0; background: transparent; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--ink-mute); }
.seg button.on { background: var(--bg-card); color: var(--ink); box-shadow: 0 1px 2px oklch(0 0 0 / .08); }
.dash-controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
.dash-ctl { display: inline-flex; align-items: center; gap: 8px; }
.dash-ctl-l { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
.chart-wrap { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px 20px 16px; margin-bottom: 18px; overflow-x: auto; }
.chart { display: flex; align-items: flex-end; gap: 12px; min-height: 210px; }
.chart-col { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 52px; flex: 1; }
.chart-bar-wrap { width: 100%; height: 170px; display: flex; align-items: flex-end; justify-content: center; }
.chart-bar { width: 64%; max-width: 44px; min-height: 3px; background: var(--accent); border-radius: 4px 4px 0 0; transition: height .35s ease; }
.chart-val { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.chart-lab { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); text-align: center; text-transform: capitalize; white-space: nowrap; }
.chart-delta { font-size: 9.5px; font-family: var(--font-mono); font-weight: 600; }
.chart-delta.up { color: var(--ok); } .chart-delta.down { color: var(--crit); } .chart-delta.flat { color: var(--ink-mute); }
.dash-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; }
.dash-table th, .dash-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
.dash-table th { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-mute); }
.dash-table td.num, .dash-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
.dash-table tr:last-child td { border-bottom: 0; }
.dash-table td.cap { text-transform: capitalize; }
.delta-up { color: var(--ok); font-weight: 600; } .delta-down { color: var(--crit); font-weight: 600; } .delta-flat { color: var(--ink-mute); }

@media (max-width: 900px) {
  .form-grid { grid-template-columns: 1fr; }
  .evt-hd { grid-template-columns: 1fr; }
  .evt-hd-r { align-items: flex-start; }
  .prog { grid-template-columns: 1fr; }
  .prog-pct { border-right: 0; border-bottom: 1px solid var(--line); padding: 0 0 12px; flex-direction: row; gap: 12px; }
  .evt-card { grid-template-columns: auto 1fr; }
  .evt-card-stat { grid-column: 2; align-items: flex-start; }
  .tsk { grid-template-columns: auto 1fr; }
  .tsk-marker { grid-column: 2; align-items: flex-start; text-align: left; min-width: 0; }
}

<script>

    { id: 't01', stage: 'pre', area: 'comercial', label: 'Generar cotización',         desc: 'Ventas prepara propuesta económica y técnica para el cliente.', start: 0, end: 0, pago: 'ambos' },
    { id: 't02', stage: 'pre', area: 'comercial', label: 'Negociación con cliente',    desc: 'Iteración de propuesta y alcance hasta llegar a acuerdo.', start: 0, end: 0, pago: 'ambos', prereq: ['t01'] },
    { id: 't03', stage: 'pre', area: 'comercial', label: 'Definir forma de pago',      desc: 'Acordar con cliente si la operación será Contado o Crédito. Se define ANTES del cierre comercial.', start: 0, end: 0, pago: 'ambos', prereq: ['t02'] },
    { id: 't04', stage: 'cierre', area: 'comercial', label: 'Recibir cotización aprobada',     desc: 'Cliente confirma cotización por escrito. Ventas debe adjuntar la cotización aprobada para poder avanzar y dejarla guardada.', start: 0, end: 0, pago: 'ambos', prereq: ['t03'], attach: { min: 1, kind: 'doc', label: 'la cotización aprobada' } },
    { id: 't05', stage: 'cierre', area: 'comercial', label: 'Envío de NV a Contabilidad',      desc: 'Ventas envía la Nota de Venta a Contabilidad para revisión. La NV es la receta que dirige toda la operatoria del evento, por lo que debe estar completa. Ventas debe adjuntar la NV para poder avanzar y dejarla guardada.', start: 0, end: 0, pago: 'ambos', prereq: ['t04'], attach: { min: 1, kind: 'doc', label: 'la Nota de Venta (NV)' } },
    { id: 't06', stage: 'cierre', area: 'comercial', label: 'Envío de contrato y firma cliente', desc: 'Ventas envía el contrato al cliente y se asegura de que sea firmado. Sin firma no avanza a la siguiente etapa. Ventas debe adjuntar el contrato firmado para poder avanzar y dejarlo guardado.', start: 0, end: 0, pago: 'ambos', prereq: ['t04'], attach: { min: 1, kind: 'doc', label: 'el contrato firmado' } },
    { id: 't11', stage: 'val', area: 'contabilidad', label: 'Revisar NV (receta de la operación)', desc: 'Contabilidad revisa que la Nota de Venta esté completa. Si falta cualquier dato, la NV se devuelve a Ventas para completar.', start: 1, end: 1, pago: 'ambos', prereq: ['t05'] },
    { id: 't11b',stage: 'val', area: 'comercial',    label: 'Completar NV si vuelve de Contabilidad', desc: 'Si Contabilidad detecta información faltante en la NV, Ventas debe completarla y reenviarla.', start: 1, end: 2, pago: 'ambos', prereq: ['t11'] },
    { id: 't12', stage: 'val', area: 'contabilidad', label: 'Aprobar NV y validar factibilidad',  desc: 'Con la NV completa, Contabilidad la aprueba y valida la factibilidad. Sólo con NV aprobada se libera la operación al resto de las áreas.', start: 2, end: 2, pago: 'ambos', prereq: ['t11b'] },
    { id: 't07', stage: 'pago', area: 'facturacion', label: 'Emitir factura post OC',           desc: 'Facturación y Cobranza emite la factura una vez que la NV está aprobada (Contado).', start: 2, end: 2, pago: 'contado', prereq: ['t12'] },
    { id: 't08', stage: 'pago', area: 'facturacion', label: 'Enviar factura al cliente',        desc: 'Facturación y Cobranza envía la factura al cliente con instrucciones de pago.', start: 2, end: 2, pago: 'contado', prereq: ['t07'] },
    { id: 't09', stage: 'pago', area: 'comercial',   label: 'Gestión de cobranza',              desc: 'En Contado la cobranza la realiza el Vendedor. Cierre obligatorio a −72h.', start: 2, end: 4, pago: 'contado', prereq: ['t08'] },
    { id: 't09b',stage: 'pago', area: 'facturacion', label: 'Conciliación diaria de pagos',     desc: 'Facturación y Cobranza concilia diariamente. Detecta el pago y confirma el corte a −72h.', start: 2, end: 4, pago: 'contado', prereq: ['t07'] },
    { id: 't10',  stage: 'pago', area: 'finanzas',    label: 'Validar / aprobar crédito',        desc: 'Crédito: Finanzas analiza y aprueba el crédito. La factura se emite después del evento.', start: 2, end: 3, pago: 'credito', prereq: ['t12'] },
    { id: 't10b', stage: 'pago', area: 'contabilidad', label: 'Validación contable del crédito',   desc: 'Contabilidad valida el registro contable de la operación a crédito en paralelo a Finanzas.', start: 2, end: 3, pago: 'credito', prereq: ['t12'] },
    { id: 't_vta_insumos', stage: 'plan', area: 'comercial', label: 'Definir insumos y activos a comprar', desc: 'El Vendedor identifica insumos y activos no existentes a comprar y pasa el listado a Compras.', start: 2, end: 2, pago: 'ambos', prereq: ['t12'] },
    { id: 't_mesa_def',    stage: 'plan', area: 'mesa',      label: 'Definir anfitriones y técnicos',      desc: 'Mesa de Ayuda decide anfitriones y técnicos y pasa el detalle a Compras.', start: 2, end: 2, pago: 'ambos', prereq: ['t12'] },
    { id: 't_log_def',     stage: 'plan', area: 'logistica', label: 'Definir proveedor de transporte/servicios',  desc: 'Logística define proveedor de transporte/servicios y pasa el detalle a Compras.', start: 2, end: 2, pago: 'ambos', prereq: ['t12'] },
    { id: 't21b', stage: 'plan', area: 'compras', label: 'Emitir OCs (servicios e insumos)', desc: 'Compras emite las OCs a partir de los inputs de Mesa, Logística y Vendedor. Sin OC nada se confirma.', start: 2, end: 3, pago: 'ambos', prereq: ['t_mesa_def','t_log_def','t_vta_insumos'] },
    { id: 't20',  stage: 'plan', area: 'compras', label: 'Gestionar insumos',                desc: 'Compra y seguimiento de los consumibles e insumos del evento.', start: 2, end: 4, pago: 'ambos', prereq: ['t21b'] },

    { id: 't17', stage: 'plan', area: 'mesa', label: 'Coordinar anfitriones',        desc: 'Convocar, briefing y confirmación de anfitriones. Requiere OC emitida.', start: 3, end: 5, pago: 'ambos', prereq: ['t21b'] },
    { id: 't19', stage: 'plan', area: 'mesa', label: 'Coordinar técnicos y montaje', desc: 'Asignación y briefing del equipo técnico, plan de montaje y tiempos. Requiere OC emitida.', start: 3, end: 6, pago: 'ambos', prereq: ['t21b'] },

    { id: 't_brief_anf', stage: 'plan', area: 'comercial', label: 'Brief con el anfitrión', desc: 'Ventas hace el brief al anfitrión: qué debe hacer durante el evento y la dinámica que buscamos. Si es branding, seguir a la marca en IG antes de subir al escenario; si es pagado, invitar a la gente a subir. Se definen las restricciones y los mensajes clave que el anfitrión debe transmitir.', start: 6, end: 6, pago: 'ambos', prereq: ['t17'] },
    { id: 't24', stage: 'plan', area: 'marketing', label: 'Brief y coordinación foto / video', desc: 'Marketing hace el briefing creativo, coordina la grabación, la entrega y postproducción. En el brief se debe indicar a Marketing el alcance del video a publicar (uso interno, RRSS, pauta), a quién se debe mencionar y etiquetar (productora o marca), el tono y los entregables esperados.', start: 3, end: 6, pago: 'ambos', prereq: ['t21b'] },

    { id: 't26', stage: 'exec', area: 'mesa',      label: 'Montaje',                          desc: 'El equipo técnico asignado por Mesa de Ayuda realiza el montaje en sitio.', start: 7, end: 7, pago: 'ambos', prereq: ['t15','t_go','t_bod_recep'] },

  ];
  return { AREAS, STAGES, TASKS, TOTAL_DAYS: 12, EVENT_DAY: 7, CLOSE_DAY: 0 };

<script type="text/babel" data-presets="react">
