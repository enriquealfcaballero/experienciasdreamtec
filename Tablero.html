function uid() { return 'e' + Math.random().toString(36).slice(2, 9); }
function fmtDate(iso, opts) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('es-CL', opts || { day: '2-digit', month: 'short', year: 'numeric' }); }
function fmtDayMonth(iso) { return new Date(iso).toLocaleDateString('es-CL', { day: '2-digit', month: 'short' }); }
function fmtRel(iso) {
  if (!iso) return '';
  const d = new Date(iso); const now = new Date();
  const diff = Math.round((now - d) / 60000);
  if (diff < 1) return 'ahora';
  if (diff < 60) return `hace ${diff} min`;
  if (diff < 24 * 60) return `hace ${Math.round(diff / 60)}h`;
  return fmtDate(iso, { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function todayLocal() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
function daysBetween(a, b) { const A = new Date(a); A.setHours(0,0,0,0); const B = new Date(b); B.setHours(0,0,0,0); return Math.round((B - A) / 86400000); }
// Cronograma anclado a la creación: las tareas de preparación (días 0..EVENT_DAY) se reparten
// entre la fecha de creación del evento y la fecha del evento, usando el tiempo realmente disponible.
// Las tareas pegadas al evento (día >= EVENT_DAY) se mantienen relativas a la fecha del evento.
function taskDate(event, taskDay) {
  const EVENT_DAY = (window.GANTT_DATA && window.GANTT_DATA.EVENT_DAY) || 7;
  const ev = new Date(event.eventDate); ev.setHours(0, 0, 0, 0);
  let created;
  if (event.createdAt) { created = new Date(event.createdAt); created.setHours(0, 0, 0, 0); }
  else { created = new Date(ev); created.setDate(ev.getDate() - EVENT_DAY); } // compat eventos sin createdAt
  if (created > ev) created = new Date(ev); // evento muy próximo: no programar antes de hoy/creación
  if (taskDay >= EVENT_DAY) { const d = new Date(ev); d.setDate(d.getDate() + (taskDay - EVENT_DAY)); return d; }
  const d = new Date(created.getTime() + (ev.getTime() - created.getTime()) * (taskDay / EVENT_DAY));
  d.setHours(0, 0, 0, 0); return d;
}
function applicableTasks(paymentMode) { return window.GANTT_DATA.TASKS.filter(t => t.pago === 'ambos' || t.pago === paymentMode); }
// --- Lectura del formulario Excel del evento (SheetJS) ---
function norm(s) { return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim(); }
function parseEventFormSheet(wb) {
  const out = [];
  wb.SheetNames.forEach(name => {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, raw: false, defval: '' });
    rows.forEach(r => {
      const familia = (r[0] || '').toString().trim();
      const pregunta = (r[1] || '').toString().trim();
      const respuesta = (r[2] || '').toString().trim();
      const notas = (r[3] || '').toString().trim();
      if (!pregunta) return;
      if (norm(familia) === 'familia' || norm(pregunta) === 'pregunta') return; // fila de cabecera
      out.push({ familia, pregunta, respuesta, notas });
    });
  });
  return out;
}
function parseLooseDate(s) {
  if (!s) return ''; s = String(s).trim();
  let m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if (m) { let y = m[3]; if (y.length === 2) y = '20' + y; return `${y}-${String(m[2]).padStart(2, '0')}-${String(m[1]).padStart(2, '0')}`; }
  m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
  const dt = new Date(s); if (!isNaN(dt)) return dt.toISOString().slice(0, 10);
  return '';
}
function parseAmount(a) { if (a == null) return 0; const n = parseInt(String(a).replace(/[^0-9]/g, ''), 10); return isNaN(n) ? 0 : n; }
function fmtCLP(n) { try { return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(n); } catch (e) { return '$' + n; } }
function monthKey(iso) { const d = new Date(iso); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
function monthLabel(key) { const p = key.split('-'); const d = new Date(Number(p[0]), Number(p[1]) - 1, 1); return d.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' }); }
function startOfWeek(iso) { const x = new Date(iso); x.setHours(0, 0, 0, 0); const day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); return x; }
function periodOf(iso, gran) {
  const d = new Date(iso);
  if (gran === 'year') { const k = String(d.getFullYear()); return { key: k, label: k }; }
  if (gran === 'week') { const s = startOfWeek(iso); const k = s.getFullYear() + '-' + String(s.getMonth() + 1).padStart(2, '0') + '-' + String(s.getDate()).padStart(2, '0'); return { key: k, label: s.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' }) }; }
  const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  return { key: k, label: new Date(d.getFullYear(), d.getMonth(), 1).toLocaleDateString('es-CL', { month: 'short', year: '2-digit' }) };
}
function fmtShort(n) { if (n >= 1e6) return '$' + (n / 1e6).toFixed(n % 1e6 === 0 ? 0 : 1) + 'M'; if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'k'; return '$' + n; }
function deltaPct(cur, prev) { if (prev == null) return null; if (prev === 0) return cur === 0 ? 0 : null; return Math.round((cur - prev) / prev * 100); }
function statusFor(task, event) {
  const today = todayLocal();
  const st = event.taskStatus?.[task.id];
  if (st?.done) return { kind: 'done', st };
  const startD = taskDate(event, task.start);
  const endD = taskDate(event, task.end);
  if (today > endD) return { kind: 'late', startD, endD, st };
  if (today >= startD) return { kind: 'now', startD, endD, st };
  return { kind: 'todo', startD, endD, st };
}

function App({ profile }) {
  const sb = window.DT.client;
  const isAdmin = profile.role === 'admin';
  const myArea = profile.area;
  const myEmail = profile.email;
  const canCreate = isAdmin || myArea === 'comercial';
  const canDash = isAdmin || ['comercial', 'facturacion', 'contabilidad'].includes(myArea);
  const canMark = (task) => isAdmin || task.area === myArea;

  const [meta, setMeta] = useS({});          // id -> metadata
  const [statuses, setStatuses] = useS({});   // eventId -> { taskId: {done,by,at} }
  const [attachments, setAttachments] = useS({}); // eventId -> { taskId: [ {id,name,path,by,at} ] }
  const [loading, setLoading] = useS(true);
  const [loadErr, setLoadErr] = useS(null);
  const [conn, setConn] = useS('connecting');
  const [view, setView] = useS('list');
  const [selectedEventId, setSelectedEventId] = useS(null);
  const [openStages, setOpenStages] = useS({});
  const [users, setUsers] = useS([]);
  const [usersLoading, setUsersLoading] = useS(false);

  async function fetchAll() {
    const [evRes, tsRes, atRes] = await Promise.all([
      sb.from(TABLE_EV).select('id, data'),
      sb.from(TABLE_TS).select('event_id, task_id, marked_by_email, marked_at'),
      sb.from(TABLE_AT).select('id, event_id, task_id, name, path, uploaded_by_email, uploaded_at')
    ]);
    if (evRes.error) { setLoadErr(evRes.error.message); setConn('error'); setLoading(false); return; }
    if (tsRes.error) { setLoadErr(tsRes.error.message); setConn('error'); setLoading(false); return; }
    const m = {}; (evRes.data || []).forEach(r => { m[r.id] = { ...(r.data || {}), id: r.id }; });
    const st = {}; (tsRes.data || []).forEach(r => {
      st[r.event_id] = st[r.event_id] || {};
      st[r.event_id][r.task_id] = { done: true, by: r.marked_by_email || '—', at: r.marked_at };
    });
    const at = {}; (atRes.data || []).forEach(r => {
      at[r.event_id] = at[r.event_id] || {};
      (at[r.event_id][r.task_id] = at[r.event_id][r.task_id] || []).push({ id: r.id, name: r.name, path: r.path, by: r.uploaded_by_email || '—', at: r.uploaded_at });
    });
    setMeta(m); setStatuses(st); setAttachments(at); setLoading(false);
    setConn(c => (c === 'saving' ? c : 'live'));
  }

  useE(() => {
    let alive = true;
    (async () => { if (alive) await fetchAll(); })();
    const ch = sb.channel('dt-rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_EV }, () => { if (alive) fetchAll(); })
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_TS }, () => { if (alive) fetchAll(); })
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_AT }, () => { if (alive) fetchAll(); })
      .subscribe((s) => { if (alive && s === 'SUBSCRIBED') setConn(c => (c === 'error' ? c : 'live')); });
    return () => { alive = false; sb.removeChannel(ch); };
  }, []);

  const events = useM(() => {
    const m = {};
    Object.values(meta).forEach(e => { m[e.id] = { ...e, taskStatus: statuses[e.id] || {} }; });
    return m;
  }, [meta, statuses]);
  const eventsList = Object.values(events).sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate));

  function createEvent(d) {
    const id = uid();
    const data = { name: d.name, client: d.client, eventDate: d.eventDate, paymentMode: d.paymentMode, seller: d.seller, venue: d.venue, attendees: d.attendees, amount: d.amount, notes: d.notes, formulario: d.formulario || [], createdAt: new Date().toISOString() };
    setMeta(s => ({ ...s, [id]: { ...data, id } }));
    setView('detail'); setSelectedEventId(id);
    setOpenStages(s => ({ ...s, [id]: ['pre', 'cierre'] }));
    setConn('saving');
    sb.from(TABLE_EV).insert({ id, data }).then(({ error }) => {
      if (error) { setConn('error'); alert('No se pudo crear el evento: ' + error.message); }
      else setConn('live');
    });
  }

  function toggleTask(eventId, task) {
    if (!canMark(task)) return;
    const done = !!statuses[eventId]?.[task.id];
    if (done && !isAdmin) { alert('Solo un administrador puede deshacer una tarea ya marcada.'); return; }
    if (!done && task.attach?.min) {
      const have = (attachments[eventId]?.[task.id] || []).length;
      if (have < task.attach.min) { alert(`Para completar esta tarea debes adjuntar ${task.attach.min === 1 ? '' : task.attach.min + ' '}${task.attach.label} antes de marcarla.`); return; }
    }
    setConn('saving');
    if (done) {
      setStatuses(s => { const ev = { ...(s[eventId] || {}) }; delete ev[task.id]; return { ...s, [eventId]: ev }; });
      sb.from(TABLE_TS).delete().eq('event_id', eventId).eq('task_id', task.id).then(({ error }) => {
        if (error) { setConn('error'); alert('No se pudo actualizar: ' + error.message); fetchAll(); } else setConn('live');
      });
    } else {
      const at = new Date().toISOString();
      setStatuses(s => ({ ...s, [eventId]: { ...(s[eventId] || {}), [task.id]: { done: true, by: myEmail, at } } }));
      sb.from(TABLE_TS).insert({ event_id: eventId, task_id: task.id, marked_by: window.DT.user.id, marked_by_email: myEmail }).then(({ error }) => {
        if (error) { setConn('error'); alert('No se pudo marcar: ' + error.message); fetchAll(); } else setConn('live');
      });
    }
  }

  async function uploadAttachment(eventId, task, file) {
    if (!canMark(task) || !file) return;
    setConn('saving');
    const safe = file.name.replace(/[^\w.\-]+/g, '_');
    const path = `${eventId}/${task.id}/${Date.now()}-${safe}`;
    const up = await sb.storage.from(BUCKET).upload(path, file, { upsert: false, contentType: file.type || undefined });
    if (up.error) { setConn('error'); alert('No se pudo subir el archivo: ' + up.error.message); return; }
    const { error } = await sb.from(TABLE_AT).insert({ event_id: eventId, task_id: task.id, name: file.name, path, mime: file.type, size: file.size, uploaded_by: window.DT.user.id, uploaded_by_email: myEmail });
    if (error) { setConn('error'); await sb.storage.from(BUCKET).remove([path]); alert('No se pudo registrar el adjunto: ' + error.message); }
    else { setConn('live'); fetchAll(); }
  }
  async function removeAttachment(eventId, taskId, row) {
    if (!isAdmin && row.by !== myEmail) { alert('Solo quien subió el archivo (o un administrador) puede eliminarlo.'); return; }
    if (!confirm('¿Eliminar el adjunto "' + row.name + '"?')) return;
    setConn('saving');
    await sb.storage.from(BUCKET).remove([row.path]);
    const { error } = await sb.from(TABLE_AT).delete().eq('id', row.id);
    if (error) { setConn('error'); alert('No se pudo eliminar el adjunto: ' + error.message); } else { setConn('live'); fetchAll(); }
  }
  async function openAttachment(row) {
    const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(row.path, 60);
    if (error) { alert('No se pudo abrir el archivo: ' + error.message); return; }
    window.open(data.signedUrl, '_blank', 'noopener');
  }

  function deleteEvent(id) {
    if (!isAdmin) return;
    if (!confirm('¿Eliminar este evento del tablero? Se borra para todas las áreas.')) return;
    setMeta(s => { const ne = { ...s }; delete ne[id]; return ne; });
    setView('list'); setSelectedEventId(null);
    setConn('saving');
    sb.from(TABLE_EV).delete().eq('id', id).then(({ error }) => {
      if (error) { setConn('error'); alert('No se pudo eliminar: ' + error.message); } else setConn('live');
    });
  }

  function setStageOpen(eventId, stageId, open) {
    setOpenStages(s => { const cur = new Set(s[eventId] || []); if (open) cur.add(stageId); else cur.delete(stageId); return { ...s, [eventId]: Array.from(cur) }; });
  }

  async function loadUsers() {
    if (!isAdmin) return;
    setUsersLoading(true);
    const { data, error } = await sb.from('profiles').select('id, email, full_name, area, role').order('email');
    setUsersLoading(false);
    if (error) { alert('No se pudieron cargar los usuarios: ' + error.message); return; }
    setUsers(data || []);
  }
  async function updateProfile(id, patch) {
    setUsers(us => us.map(u => u.id === id ? { ...u, ...patch } : u)); // optimista
    const { error } = await sb.from('profiles').update(patch).eq('id', id);
    if (error) { alert('No se pudo actualizar el usuario: ' + error.message); loadUsers(); }
  }
  async function deleteUser(id, label) {
    if (!confirm('¿Eliminar definitivamente a ' + label + '? Perderá el acceso y deberá registrarse de nuevo. Las tareas que marcó quedan registradas.')) return;
    setUsers(us => us.filter(u => u.id !== id)); // optimista
    const { error } = await sb.rpc('admin_delete_user', { target: id });
    if (error) { alert('No se pudo eliminar: ' + error.message); loadUsers(); }
  }
  function openUsers() { setView('users'); loadUsers(); }

  if (loading) return <div className="loading-wrap"><span className="spin"></span> Cargando eventos…</div>;
  if (loadErr) return (
    <div className="app"><div className="evt-empty"><div className="evt-empty-h">No se pudieron cargar los datos</div><p className="evt-empty-p">{loadErr}</p><button className="btn btn-primary" onClick={() => { setLoadErr(null); setLoading(true); fetchAll(); }}>Reintentar</button></div></div>
  );

  const selected = selectedEventId ? events[selectedEventId] : null;

  return (
    <div className="app">
      <TopBar profile={profile} isAdmin={isAdmin} canDash={canDash} conn={conn} onUsers={openUsers} onDashboard={() => setView('dashboard')} />
      {view === 'list' && (
        <EventsView events={eventsList} canCreate={canCreate} isAdmin={isAdmin}
          onOpen={(id) => { setView('detail'); setSelectedEventId(id); }}
          onNew={() => setView('new')} onDelete={deleteEvent} />
      )}
      {view === 'new' && <NewEventView onSubmit={createEvent} onCancel={() => setView('list')} defaultSeller={profile.full_name || ''} />}
      {view === 'detail' && selected && (
        <EventDetailView event={selected} isAdmin={isAdmin} myArea={myArea} myEmail={myEmail} canMark={canMark}
          openStages={openStages[selectedEventId] || []}
          attachments={attachments[selectedEventId] || {}}
          onBack={() => { setView('list'); setSelectedEventId(null); }}
          onToggle={(task) => toggleTask(selectedEventId, task)}
          onUpload={(task, file) => uploadAttachment(selectedEventId, task, file)}
          onRemoveAttachment={(taskId, row) => removeAttachment(selectedEventId, taskId, row)}
          onOpenAttachment={openAttachment}
          onDelete={() => deleteEvent(selectedEventId)}
          onStageOpen={(stageId, open) => setStageOpen(selectedEventId, stageId, open)} />
      )}
      {view === 'detail' && !selected && (
        <div className="evt-empty" style={{ marginTop: 24 }}>
          <div className="evt-empty-h">Este evento ya no existe</div>
          <p className="evt-empty-p">Puede que otra persona lo haya eliminado.</p>
          <button className="btn btn-primary" onClick={() => { setView('list'); setSelectedEventId(null); }}>← Volver a eventos</button>
        </div>
      )}
      {view === 'dashboard' && canDash && (
        <DashboardView events={eventsList} onBack={() => setView('list')} />
      )}
      {view === 'users' && isAdmin && (
        <UsersView users={users} loading={usersLoading} meId={window.DT.user.id}
          onBack={() => setView('list')} onReload={loadUsers}
          onSetRole={(id, role) => updateProfile(id, { role })}
          onSetArea={(id, area) => updateProfile(id, { area })}
          onDelete={(id, label) => deleteUser(id, label)} />
      )}
    </div>
  );
}

function TopBar({ profile, isAdmin, canDash, conn, onUsers, onDashboard }) {
  const G = window.GANTT_DATA;
  const connLabel = { connecting: 'Conectando', live: 'En vivo', saving: 'Guardando…', error: 'Sin conexión' }[conn] || '';
  const connCls = 'tb-conn' + (conn === 'live' ? ' live' : conn === 'saving' ? ' saving' : conn === 'error' ? ' error' : '');
  return (
    <div className="topbar">
      <img src="assets/dreamtec-logo.png" alt="Dreamtec" className="tb-logo" />
      <div className="tb-div"></div>
      <div className="tb-tag">Tablero operativo · Eventos</div>
      <span className={connCls} title="Estado de la conexión en tiempo real"><span className="tb-conn-dot"></span>{connLabel}</span>
      <div className="tb-spacer"></div>
      {canDash && <button className="btn btn-sm" onClick={onDashboard} title="Resumen de eventos por mes">Dashboard</button>}
      {isAdmin && <button className="btn btn-sm" onClick={onUsers} title="Gestionar usuarios y permisos">Usuarios</button>}
      <div className="user-box">
        <span className="user-name">{profile.full_name || profile.email}</span>
        {isAdmin ? <span className="user-adm">Admin</span> : <span className="user-area">{G.AREAS[profile.area]?.label || profile.area}</span>}
        <button className="user-out" onClick={() => window.DT.signOut()}>Salir</button>
      </div>
      <a className="nav-cta" href="index.html" title="Ver la Carta Gantt del flujo completo">
        <span className="nav-cta-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M4 6h10"></path><path d="M8 12h12"></path><path d="M4 18h8"></path>
            <circle cx="4" cy="6" r="1.2" fill="currentColor"></circle><circle cx="8" cy="12" r="1.2" fill="currentColor"></circle><circle cx="4" cy="18" r="1.2" fill="currentColor"></circle>
          </svg>
        </span>
        <span className="nav-cta-text"><span className="nav-cta-eye">Ver</span><span className="nav-cta-label">Carta Gantt</span></span>
        <span className="nav-cta-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg></span>
      </a>
    </div>
  );
}

function EventsView({ events, canCreate, isAdmin, onOpen, onNew, onDelete }) {
  return (
    <>
      <div className="ph">
        <div className="ph-l">
          <div className="ph-eye">Eventos activos</div>
          <h1 className="ph-title">Tablero operativo</h1>
          <p className="ph-sub">Cada evento despliega el checklist de las 8 etapas. Cada área marca sus propias tareas y todos ven el avance en tiempo real.</p>
        </div>
        {canCreate && <button className="btn btn-primary" onClick={onNew}><span style={{ fontWeight: 700 }}>+</span> Nuevo evento</button>}
      </div>
      {events.length === 0 ? (
        <div className="evt-empty">
          <div className="evt-empty-h">Aún no hay eventos cargados</div>
          <p className="evt-empty-p">{canCreate ? 'Crea un evento al cerrar la venta. Desde ese momento el checklist queda disponible para todas las áreas.' : 'Cuando Ventas cargue un evento, aparecerá aquí y podrás marcar las tareas de tu área.'}</p>
          {canCreate && <button className="btn btn-primary" onClick={onNew}>+ Crear el primero</button>}
        </div>
      ) : (
        <div className="evts">
          {events.map(ev => <EventCard key={ev.id} event={ev} isAdmin={isAdmin} onClick={() => onOpen(ev.id)} onDelete={() => onDelete(ev.id)} />)}
        </div>
      )}
    </>
  );
}

function EventCard({ event, isAdmin, onClick, onDelete }) {
  const tasks = applicableTasks(event.paymentMode);
  const done = tasks.filter(t => event.taskStatus?.[t.id]?.done).length;
  const total = tasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const days = daysBetween(todayLocal(), new Date(event.eventDate));
  const late = tasks.filter(t => statusFor(t, event).kind === 'late').length;
  const badge = (() => {
    if (pct === 100) return { kind: 'ok', text: 'Completo' };
    if (late > 0) return { kind: 'crit', text: `${late} atrasada${late > 1 ? 's' : ''}` };
    if (days < 0) return { kind: 'warn', text: 'Post-evento' };
    if (days <= 3) return { kind: 'crit', text: 'Corte −72h' };
    if (days <= 7) return { kind: 'warn', text: `D−${days}` };
    return { kind: 'ok', text: `D−${days}` };
  })();
  const barCls = pct === 100 ? 'ok' : (late > 0 ? 'crit' : '');
  const date = new Date(event.eventDate);
  return (
    <div className="evt-card" onClick={onClick} role="button" tabIndex={0} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick(); } }}>
      <div className="evt-card-date">
        <div className="evt-card-date-d">{String(date.getDate()).padStart(2, '0')}</div>
        <div className="evt-card-date-m">{date.toLocaleDateString('es-CL', { month: 'short' }).replace('.', '')}</div>
      </div>
      <div className="evt-card-body">
        <div className="evt-card-top"><h3 className="evt-card-title">{event.name || 'Evento sin nombre'}</h3><span className="evt-card-client">{event.client || '—'}</span></div>
        <div className="evt-card-meta">
          <span>{event.paymentMode === 'contado' ? 'Contado' : 'Crédito'}</span>
          {event.venue && <span>· {event.venue}</span>}{event.seller && <span>· {event.seller}</span>}{event.attendees && <span>· {event.attendees} pax</span>}
        </div>
      </div>
      <div className="evt-card-stat">
        <span className={'evt-card-badge ' + badge.kind}>{badge.text}</span>
        <div className="evt-card-pct">{pct}%</div>
        <div className="evt-card-bar"><div className={'evt-card-bar-fill ' + barCls} style={{ width: pct + '%' }}></div></div>
        <div className="evt-card-pct-l">{done}/{total} tareas</div>
      </div>
      {isAdmin && <button className="evt-card-del" onClick={(e) => { e.stopPropagation(); onDelete(); }} title="Eliminar evento" aria-label="Eliminar evento">×</button>}
    </div>
  );
}

function NewEventView({ onSubmit, onCancel, defaultSeller }) {
  const [name, setName] = useS('');
  const [client, setClient] = useS('');
  const [eventDate, setEventDate] = useS('');
  const [paymentMode, setPaymentMode] = useS('contado');
  const [seller, setSeller] = useS(defaultSeller || '');
  const [venue, setVenue] = useS('');
  const [attendees, setAttendees] = useS('');
  const [amount, setAmount] = useS('');
  const [notes, setNotes] = useS('');
  const [formRows, setFormRows] = useS(null); // respuestas del Excel
  const [formName, setFormName] = useS('');
  const [formErr, setFormErr] = useS('');

  async function onForm(e) {
    const file = e.target.files && e.target.files[0]; e.target.value = '';
    if (!file) return;
    setFormErr('');
    try {
      const wb = XLSX.read(await file.arrayBuffer(), { type: 'array' });
      const rows = parseEventFormSheet(wb);
      if (!rows.length) { setFormErr('No se encontraron respuestas (Familia / Pregunta / Respuesta) en el Excel.'); return; }
      setFormRows(rows); setFormName(file.name);
      // Prellenado automático desde el formulario
      const ans = (q) => { const r = rows.find(x => norm(x.pregunta).includes(norm(q))); return r ? r.respuesta : ''; };
      const lugar = ans('lugar del evento'); if (lugar) setVenue(lugar);
      const pax = ans('cantidad de personas'); if (pax) { const n = pax.replace(/[^0-9]/g, ''); if (n) setAttendees(n); }
      const dRow = rows.find(x => norm(x.familia) === 'evento' && norm(x.pregunta) === 'dia');
      const d = parseLooseDate(dRow ? dRow.respuesta : ''); if (d) setEventDate(d);
    } catch (err) { setFormErr('No se pudo leer el Excel: ' + err.message); }
  }

  function submit(e) {
    e.preventDefault();
    if (!name.trim() || !eventDate) return;
    if (!formRows) { setFormErr('Debes subir el formulario Excel del evento (lleno) para poder crearlo.'); return; }
    onSubmit({ name: name.trim(), client: client.trim(), eventDate, paymentMode, seller: seller.trim(), venue: venue.trim(), attendees, amount, notes: notes.trim(), formulario: formRows });
  }

  const families = formRows ? [...new Set(formRows.map(r => r.familia).filter(Boolean))] : [];
  return (
    <>
      <div className="detail-bar"><button className="btn btn-sm btn-ghost" onClick={onCancel}>← Volver</button><span className="crumb">Eventos / <span className="crumb-cur">Nuevo evento</span></span></div>
      <div className="ph"><div className="ph-l"><div className="ph-eye">Nuevo evento</div><h1 className="ph-title">Agregar al tablero</h1><p className="ph-sub">Sube el <strong>formulario Excel</strong> lleno con el cliente; de ahí se completan datos y queda guardado el brief. Al guardar, el checklist queda disponible para todas las áreas y la fecha define el cronograma.</p></div></div>
      <form className="form" onSubmit={submit}>
        <div className={'form-file' + (formRows ? ' ok' : '')}>
          <div className="form-file-main">
            <div className="form-file-ic">📄</div>
            <div>
              <div className="form-file-t">{formRows ? `Formulario cargado: ${formName}` : 'Formulario del evento (Excel) — obligatorio'}</div>
              <div className="form-file-s">{formRows ? `${formRows.length} respuestas leídas · puedes reemplazarlo` : 'Sube el Excel lleno con el cliente (.xlsx). Se extraen fecha, lugar y asistentes, y se guarda el brief completo.'}</div>
            </div>
          </div>
          <label className="btn btn-sm btn-primary" style={{ cursor: 'pointer' }}>
            {formRows ? 'Reemplazar' : 'Subir Excel'}
            <input type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={onForm} />
          </label>
        </div>
        {formErr && <div className="alert crit" style={{ marginBottom: 14 }}><span className="alert-icon"><span>!</span></span><div>{formErr}</div></div>}
        {formRows && (
          <details className="form-preview">
            <summary>Ver respuestas del formulario ({formRows.length})</summary>
            {families.map(fam => (
              <div key={fam} className="form-preview-fam">
                <div className="form-preview-fam-t">{fam}</div>
                {formRows.filter(r => r.familia === fam).map((r, i) => (
                  <div key={i} className="form-preview-row"><span className="form-preview-q">{r.pregunta}</span><span className="form-preview-a">{r.respuesta || '—'}{r.notas ? ` · ${r.notas}` : ''}</span></div>
                ))}
              </div>
            ))}
          </details>
        )}
        <div className="form-grid">
          <div className="form-row full"><label htmlFor="name">Nombre del evento</label><input id="name" value={name} onChange={(e) => setName(e.target.value)} placeholder="Ej: Lanzamiento Línea Premium" required /></div>
          <div className="form-row"><label htmlFor="client">Cliente</label><input id="client" value={client} onChange={(e) => setClient(e.target.value)} placeholder="Ej: Cervecería XYZ" /></div>
          <div className="form-row"><label htmlFor="seller">Vendedor responsable</label><input id="seller" value={seller} onChange={(e) => setSeller(e.target.value)} placeholder="Tu nombre" /></div>
          <div className="form-row"><label htmlFor="eventDate">Fecha del evento</label><input id="eventDate" type="date" value={eventDate} onChange={(e) => setEventDate(e.target.value)} required /></div>
          <div className="form-row"><label>Forma de pago</label><div className="form-pay">
            <button type="button" className={'form-pay-opt' + (paymentMode === 'contado' ? ' on' : '')} onClick={() => setPaymentMode('contado')}><span className="form-pay-opt-r"></span>Contado</button>
            <button type="button" className={'form-pay-opt' + (paymentMode === 'credito' ? ' on' : '')} onClick={() => setPaymentMode('credito')}><span className="form-pay-opt-r"></span>Crédito</button>
          </div></div>
          <div className="form-row"><label htmlFor="venue">Lugar</label><input id="venue" value={venue} onChange={(e) => setVenue(e.target.value)} placeholder="Dirección o recinto" /></div>
          <div className="form-row"><label htmlFor="attendees">Asistentes esperados</label><input id="attendees" type="number" value={attendees} onChange={(e) => setAttendees(e.target.value)} placeholder="0" min="0" /></div>
          <div className="form-row full">
            <label htmlFor="amount">Monto vendido (CLP)</label>
            <input id="amount" type="text" inputMode="numeric" value={amount ? Number(amount).toLocaleString('es-CL') : ''}
              onChange={(e) => setAmount(e.target.value.replace(/[^0-9]/g, ''))}
              placeholder="Solo números, ej: 1500000" />
            <span style={{ fontSize: 11, color: 'var(--ink-mute)' }}>{amount ? fmtCLP(Number(amount)) : 'Solo se aceptan números; se usa para el dashboard.'}</span>
          </div>
          <div className="form-row full"><label htmlFor="notes">Notas</label><textarea id="notes" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Detalles, requerimientos especiales, etc." /></div>
        </div>
        <div className="form-foot"><button type="button" className="btn" onClick={onCancel}>Cancelar</button><button type="submit" className="btn btn-primary">Crear evento</button></div>
      </form>
    </>
  );
}

function EventDetailView({ event, isAdmin, myArea, myEmail, canMark, openStages, attachments, onBack, onToggle, onUpload, onRemoveAttachment, onOpenAttachment, onDelete, onStageOpen }) {
  const G = window.GANTT_DATA;
  const tasks = useM(() => applicableTasks(event.paymentMode), [event.paymentMode]);
  const days = daysBetween(todayLocal(), new Date(event.eventDate));
  const doneN = tasks.filter(t => event.taskStatus?.[t.id]?.done).length;
  const pct = tasks.length ? Math.round((doneN / tasks.length) * 100) : 0;
  const byArea = useM(() => { const m = {}; tasks.forEach(t => { m[t.area] = m[t.area] || { total: 0, done: 0 }; m[t.area].total += 1; if (event.taskStatus?.[t.id]?.done) m[t.area].done += 1; }); return m; }, [tasks, event.taskStatus]);
  const alerts = useM(() => {
    const out = [];
    const nvDone = event.taskStatus?.['t12']?.done;
    const nvTask = tasks.find(t => t.id === 't12');
    if (nvTask && !nvDone) { const due = taskDate(event, nvTask.end); if (todayLocal() >= due) out.push({ kind: 'crit', text: <><strong>NV no aprobada por Contabilidad.</strong> Sin esto, ninguna otra área puede avanzar.</> }); }
    if (event.paymentMode === 'contado' && days <= 3 && days >= 0) { const pagoDone = event.taskStatus?.['t09']?.done && event.taskStatus?.['t09b']?.done; if (!pagoDone) out.push({ kind: 'crit', text: <><strong>Corte a −72h sin pago detectado.</strong> Sin confirmación, el evento no se ejecuta.</> }); }
    if (days <= 3 && days >= 0 && !event.taskStatus?.['t_go']?.done) out.push({ kind: 'warn', text: <><strong>Facturación y Cobranza aún no confirma go / no-go.</strong> Plazo: −72h del evento.</> });
    if (days === 1 && !event.taskStatus?.['t_bod_recep']?.done) out.push({ kind: 'crit', text: <><strong>Bodega aún no registra los insumos y activos comprados.</strong> Plazo: hoy (D−1).</> });
    if (days === -1 && !event.taskStatus?.['t30']?.done) out.push({ kind: 'warn', text: <><strong>Bodega aún no registra recepción.</strong> Verificación debe ocurrir hoy (D+1).</> });
    return out;
  }, [event, tasks, days]);
  const stages = G.STAGES;
  // Filtro por área: por defecto un miembro ve solo las tareas de su área; el admin ve todas.
  const [areaFilter, setAreaFilter] = useS(() => (isAdmin ? 'all' : (tasks.some(t => t.area === myArea) ? myArea : 'all')));
  const tasksByStage = useM(() => {
    const vis = areaFilter === 'all' ? tasks : tasks.filter(t => t.area === areaFilter);
    const m = {}; stages.forEach(s => m[s.id] = []); vis.forEach(t => { if (m[t.stage]) m[t.stage].push(t); }); return m;
  }, [tasks, areaFilter]);
  const forceOpen = areaFilter !== 'all'; // al filtrar por área, se muestran las etapas expandidas
  const isOpen = (sid) => forceOpen || openStages.includes(sid);
  return (
    <>
      <div className="detail-bar">
        <button className="btn btn-sm btn-ghost" onClick={onBack}>← Eventos</button>
        <span className="crumb">Eventos / <span className="crumb-cur">{event.name}</span></span>
        <div style={{ flex: 1 }}></div>
        {isAdmin && <button className="btn btn-sm btn-ghost" onClick={onDelete} title="Eliminar evento">Eliminar</button>}
      </div>
      <div className="evt-hd">
        <div className="evt-hd-l">
          <div className="evt-hd-eye">Evento · {event.paymentMode === 'contado' ? 'Contado' : 'Crédito'}</div>
          <h1 className="evt-hd-title">{event.name}</h1>
          <div className="evt-hd-client">{event.client || 'Cliente sin especificar'}</div>
          <div className="evt-hd-meta">
            <span>Fecha · <strong>{fmtDate(event.eventDate)}</strong></span>
            {event.venue && <span>· Lugar · <strong>{event.venue}</strong></span>}
            {event.seller && <span>· Vendedor · <strong>{event.seller}</strong></span>}
            {event.attendees && <span>· <strong>{event.attendees}</strong> pax</span>}
          </div>
        </div>
        <div className="evt-hd-r"><div className={'evt-countdown' + (days <= 3 && days >= 0 ? ' crit' : '')}><div className="evt-countdown-n">{days >= 0 ? `D−${days}` : `D+${Math.abs(days)}`}</div><div className="evt-countdown-l">{days === 0 ? 'es hoy' : (days > 0 ? 'para el evento' : 'post-evento')}</div></div></div>
      </div>
      {alerts.length > 0 && <div className="alerts">{alerts.map((a, i) => <div key={i} className={'alert ' + a.kind}><span className="alert-icon"><span>!</span></span><div>{a.text}</div></div>)}</div>}
      {event.formulario && event.formulario.length > 0 && (
        <details className="evt-form">
          <summary>📄 Brief del evento · formulario ({event.formulario.length} respuestas)</summary>
          <div className="evt-form-body">
            {[...new Set(event.formulario.map(r => r.familia).filter(Boolean))].map(fam => (
              <div key={fam} className="form-preview-fam">
                <div className="form-preview-fam-t">{fam}</div>
                {event.formulario.filter(r => r.familia === fam).map((r, i) => (
                  <div key={i} className="form-preview-row"><span className="form-preview-q">{r.pregunta}</span><span className="form-preview-a">{r.respuesta || '—'}{r.notas ? ` · ${r.notas}` : ''}</span></div>
                ))}
              </div>
            ))}
          </div>
        </details>
      )}
      <div className="prog">
        <div className="prog-pct"><div className="prog-pct-n">{pct}%</div><div className="prog-pct-l">{doneN}/{tasks.length} tareas</div></div>
        <div className="prog-areas">{Object.entries(byArea).map(([k, v]) => { const a = G.AREAS[k]; const p = v.total ? (v.done / v.total) * 100 : 0; return (<div key={k} className="prog-area"><span className="prog-area-dot" style={{ background: a.color }}></span><span className="prog-area-name">{a.label}</span><div className="prog-area-bar"><div className="prog-area-bar-fill" style={{ width: p + '%', background: a.color }}></div></div><span className="prog-area-frac">{v.done}/{v.total}</span></div>); })}</div>
      </div>
      <div className="area-filter">
        <span className="area-filter-l">Ver tareas de:</span>
        <button className={'area-chip' + (areaFilter === 'all' ? ' on' : '')} onClick={() => setAreaFilter('all')}>Todas las áreas</button>
        {Object.keys(byArea).map(k => (
          <button key={k} className={'area-chip' + (areaFilter === k ? ' on' : '')} onClick={() => setAreaFilter(k)}>
            <span className="area-chip-dot" style={{ background: G.AREAS[k].color }}></span>{G.AREAS[k].label}{k === myArea ? ' · tu área' : ''}
          </button>
        ))}
      </div>
      <div className="stages">
        {stages.map(stage => {
          const sTasks = tasksByStage[stage.id] || [];
          if (sTasks.length === 0) return null;
          const sDone = sTasks.filter(t => event.taskStatus?.[t.id]?.done).length;
          const sPct = sTasks.length ? (sDone / sTasks.length) * 100 : 0;
          const allDone = sDone === sTasks.length;
          const open = isOpen(stage.id);
          return (
            <div key={stage.id} className={'stg' + (open ? ' open' : '')}>
              <div className="stg-hd" onClick={() => onStageOpen(stage.id, !open)}>
                <div className="stg-n">{stage.n}</div>
                <div className="stg-titles"><div className="stg-title">{stage.label}</div><div className="stg-sub">{stage.sub}</div></div>
                <div className="stg-prog"><span className="stg-prog-frac">{sDone}/{sTasks.length}</span><div className="stg-prog-bar"><div className={'stg-prog-bar-fill' + (allDone ? ' done' : '')} style={{ width: sPct + '%' }}></div></div></div>
                <span className="stg-chev">›</span>
              </div>
              {open && <div className="stg-body">{sTasks.map(t => <TaskRow key={t.id} task={t} event={event} isAdmin={isAdmin} myArea={myArea} myEmail={myEmail} canMark={canMark(t)} attachments={attachments[t.id] || []} onToggle={() => onToggle(t)} onUpload={onUpload} onRemoveAttachment={onRemoveAttachment} onOpenAttachment={onOpenAttachment} />)}</div>}
            </div>
          );
        })}
      </div>
    </>
  );
}

function TaskRow({ task, event, isAdmin, myArea, myEmail, canMark, attachments, onToggle, onUpload, onRemoveAttachment, onOpenAttachment }) {
  const G = window.GANTT_DATA;
  const area = G.AREAS[task.area];
  const st = statusFor(task, event);
  const done = st.kind === 'done';
  const prereqDone = (task.prereq || []).every(pid => event.taskStatus?.[pid]?.done);
  const prereqLocked = !done && !prereqDone;
  const startD = taskDate(event, task.start);
  const endD = taskDate(event, task.end);
  const sameDay = task.start === task.end;
  const dayRange = sameDay ? fmtDayMonth(startD) : `${fmtDayMonth(startD)} – ${fmtDayMonth(endD)}`;
  let metaCls = 'tsk-meta-item'; let metaTxt = dayRange;
  if (st.kind === 'late') { metaCls += ' late'; metaTxt = '⚠ atrasada · ' + dayRange; }
  else if (st.kind === 'now') { metaCls += ' now'; metaTxt = '● en curso · ' + dayRange; }
  const mine = task.area === myArea;
  const need = task.attach?.min || 0;
  const have = (attachments || []).length;
  const attachMissing = need > 0 && have < need;
  const clickable = done ? isAdmin : (canMark && !prereqLocked); // el gate de adjuntos lo valida onToggle con aviso
  let checkCls = 'tsk-check' + (done ? ' on' : '');
  if (!canMark) checkCls += ' area-locked';
  else if (prereqLocked || (!done && attachMissing)) checkCls += ' locked';
  const checkTitle = !canMark ? `Solo ${area.label} puede marcar esta tarea`
    : (done ? (isAdmin ? 'Deshacer (solo admin)' : 'Solo un administrador puede deshacer')
      : (prereqLocked ? 'Esperando que se completen las tareas previas'
        : (attachMissing ? `Adjunta ${task.attach.label} para poder completar` : 'Marcar como hecho')));
  return (
    <div className={'tsk' + (done ? ' done' : '')}>
      <button className={checkCls} onClick={(e) => { e.preventDefault(); if (clickable) onToggle(); }} title={checkTitle} aria-label="Marcar tarea"></button>
      <div className="tsk-body">
        <div className="tsk-top"><span className="tsk-label">{task.label}</span><span className={'tsk-area' + (mine ? ' mine' : '')}><span className="tsk-area-dot" style={{ background: area.color }}></span>{area.label}{mine ? ' · tu área' : ''}</span></div>
        {task.desc && <div className="tsk-desc">{task.desc}</div>}
        <div className="tsk-meta">
          <span className="tsk-day">D{task.start}{task.start !== task.end ? `–${task.end}` : ''}</span>
          <span className={metaCls}>{metaTxt}</span>
          {prereqLocked && <span className="tsk-meta-item">🔒 esperando prerequisitos</span>}
          {!canMark && !done && <span className="tsk-meta-item">🔒 solo {area.label}</span>}
          {need > 0 && <span className={'tsk-meta-item' + (attachMissing ? ' late' : '')}>📎 {have}/{need} {task.attach.label}</span>}
        </div>
        {task.attach && (canMark || have > 0) && (
          <div className="tsk-attach">
            {(attachments || []).map(a => (
              <span key={a.id} className="att-chip">
                <button className="att-name" onClick={() => onOpenAttachment(a)} title={`Abrir · subido por ${a.by}`}>📄 {a.name}</button>
                {(isAdmin || a.by === myEmail) && <button className="att-x" onClick={() => onRemoveAttachment(task.id, a)} title="Eliminar adjunto">×</button>}
              </span>
            ))}
            {canMark && !done && (
              <label className="att-add">
                + Adjuntar {task.attach.kind === 'foto' ? 'foto' : 'archivo'}
                <input type="file" accept={task.attach.kind === 'foto' ? 'image/*' : undefined} style={{ display: 'none' }}
                  onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onUpload(task, f); e.target.value = ''; }} />
              </label>
            )}
          </div>
        )}
      </div>
      {done && <div className="tsk-marker"><span className="tsk-marker-by">{st.st.by}</span><span className="tsk-marker-when">{fmtRel(st.st.at)}</span>{isAdmin && <button className="tsk-marker-undo" onClick={onToggle}>deshacer</button>}</div>}
    </div>
  );
}

function Kpi({ label, value }) {
  return <div className="evt-card" style={{ cursor: 'default', display: 'block', padding: '16px 18px' }}><div className="prog-pct-n" style={{ fontSize: 24 }}>{value}</div><div className="prog-pct-l">{label}</div></div>;
}

function DeltaTag({ d }) {
  if (d == null) return <span className="chart-delta flat">—</span>;
  const dir = d > 0 ? 'up' : d < 0 ? 'down' : 'flat';
  const arrow = d > 0 ? '▲' : d < 0 ? '▼' : '•';
  return <span className={'chart-delta ' + dir}>{arrow} {Math.abs(d)}%</span>;
}

function DashboardView({ events, onBack }) {
  const [gran, setGran] = useS('month');
  const [metric, setMetric] = useS('dinero');
  const rows = useM(() => {
    const m = {};
    events.forEach(e => {
      if (!e.eventDate) return;
      const p = periodOf(e.eventDate, gran);
      m[p.key] = m[p.key] || { key: p.key, label: p.label, count: 0, total: 0, contado: 0, credito: 0 };
      const amt = parseAmount(e.amount);
      m[p.key].count += 1; m[p.key].total += amt;
      if (e.paymentMode === 'credito') m[p.key].credito += amt; else m[p.key].contado += amt;
    });
    return Object.values(m).sort((a, b) => a.key < b.key ? -1 : 1);
  }, [events, gran]);
  const valOf = (r) => metric === 'dinero' ? r.total : r.count;
  const maxVal = rows.reduce((mx, r) => Math.max(mx, valOf(r)), 0) || 1;
  const totalEvents = events.length;
  const totalMoney = events.reduce((s, e) => s + parseAmount(e.amount), 0);
  const last = rows[rows.length - 1];
  const prev = rows[rows.length - 2];
  const lastDelta = last ? deltaPct(valOf(last), prev ? valOf(prev) : null) : null;
  const granLabel = { week: 'semana', month: 'mes', year: 'año' }[gran];
  const metricLabel = metric === 'dinero' ? 'dinero vendido' : 'eventos';
  const deltaCls = (d) => d == null ? 'delta-flat' : d > 0 ? 'delta-up' : d < 0 ? 'delta-down' : 'delta-flat';
  const deltaTxt = (d) => d == null ? '—' : (d > 0 ? '▲ ' : d < 0 ? '▼ ' : '• ') + Math.abs(d) + '%';
  return (
    <>
      <div className="detail-bar">
        <button className="btn btn-sm btn-primary" onClick={onBack}>← Volver a eventos</button>
        <span className="crumb">Eventos / <span className="crumb-cur">Dashboard</span></span>
      </div>
      <div className="ph"><div className="ph-l"><div className="ph-eye">Resumen</div><h1 className="ph-title">Dashboard de eventos</h1><p className="ph-sub">Crecimiento de {metricLabel} por {granLabel}, con la variación respecto al período anterior.</p></div></div>
      <div className="dash-controls">
        <div className="dash-ctl"><span className="dash-ctl-l">Ver</span><div className="seg">
          {[['eventos', 'Eventos'], ['dinero', 'Dinero']].map(([k, l]) => <button key={k} className={metric === k ? 'on' : ''} onClick={() => setMetric(k)}>{l}</button>)}
        </div></div>
        <div className="dash-ctl"><span className="dash-ctl-l">Agrupar por</span><div className="seg">
          {[['week', 'Semana'], ['month', 'Mes'], ['year', 'Año']].map(([k, l]) => <button key={k} className={gran === k ? 'on' : ''} onClick={() => setGran(k)}>{l}</button>)}
        </div></div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(190px,1fr))', gap: 12, marginBottom: 18 }}>
        <Kpi label="Eventos totales" value={totalEvents} />
        <Kpi label="Plata vendida (total)" value={fmtCLP(totalMoney)} />
        <Kpi label={'Último ' + granLabel + ' · ' + metricLabel} value={last ? (metric === 'dinero' ? fmtCLP(last.total) : last.count) : '—'} />
        <Kpi label={'Variación vs ' + granLabel + ' anterior'} value={<span className={deltaCls(lastDelta)}>{deltaTxt(lastDelta)}</span>} />
      </div>
      {rows.length === 0 ? (
        <div className="evt-empty"><div className="evt-empty-h">Sin datos todavía</div><p className="evt-empty-p">Cuando se carguen eventos verás aquí el crecimiento por {granLabel}.</p></div>
      ) : (
        <>
          <div className="chart-wrap">
            <div className="chart">
              {rows.map((r, i) => {
                const v = valOf(r);
                const d = deltaPct(v, i > 0 ? valOf(rows[i - 1]) : null);
                return (
                  <div key={r.key} className="chart-col">
                    <span className="chart-val">{metric === 'dinero' ? fmtShort(r.total) : r.count}</span>
                    <div className="chart-bar-wrap"><div className="chart-bar" style={{ height: (v / maxVal * 100) + '%' }} title={r.label + ': ' + (metric === 'dinero' ? fmtCLP(r.total) : r.count + ' eventos')}></div></div>
                    <DeltaTag d={d} />
                    <span className="chart-lab">{r.label}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <table className="dash-table">
            <thead><tr><th>Período</th><th className="num">Eventos</th><th className="num">Vendido</th><th className="num">Contado</th><th className="num">Crédito</th><th className="num">Var. {metricLabel}</th></tr></thead>
            <tbody>
              {rows.map((r, i) => ({ r, d: deltaPct(valOf(r), i > 0 ? valOf(rows[i - 1]) : null) })).reverse().map(({ r, d }) => (
                <tr key={r.key}>
                  <td className="cap">{r.label}</td>
                  <td className="num">{r.count}</td>
                  <td className="num">{fmtCLP(r.total)}</td>
                  <td className="num">{fmtCLP(r.contado)}</td>
                  <td className="num">{fmtCLP(r.credito)}</td>
                  <td className={'num ' + deltaCls(d)}>{deltaTxt(d)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </>
  );
}

function UsersView({ users, loading, meId, onBack, onReload, onSetRole, onSetArea, onDelete }) {
  const G = window.GANTT_DATA;
  return (
    <>
      <div className="detail-bar">
        <button className="btn btn-sm btn-ghost" onClick={onBack}>← Eventos</button>
        <span className="crumb">Eventos / <span className="crumb-cur">Usuarios</span></span>
        <div style={{ flex: 1 }}></div>
        <button className="btn btn-sm" onClick={onReload}>Actualizar</button>
      </div>
      <div className="ph"><div className="ph-l">
        <div className="ph-eye">Administración</div>
        <h1 className="ph-title">Usuarios y permisos</h1>
        <p className="ph-sub">Cambia el área de una persona o conviértela en administradora. Los administradores ven y aprueban todo, crean y eliminan eventos, y gestionan usuarios.</p>
      </div></div>
      {loading ? <div className="loading-wrap"><span className="spin"></span> Cargando usuarios…</div>
      : users.length === 0 ? <div className="evt-empty"><div className="evt-empty-h">Aún no hay usuarios</div><p className="evt-empty-p">Aparecerán aquí a medida que se registren.</p></div>
      : (
        <div className="evts">
          {users.map(u => {
            const isMe = u.id === meId;
            const admin = u.role === 'admin';
            return (
              <div key={u.id} className="evt-card" style={{ cursor: 'default', gridTemplateColumns: '1fr auto' }}>
                <div className="evt-card-body">
                  <div className="evt-card-top">
                    <h3 className="evt-card-title">{u.full_name || '(sin nombre)'}</h3>
                    {admin && <span className="user-adm">Admin</span>}
                    {isMe && <span className="evt-card-client">· tú</span>}
                  </div>
                  <div className="evt-card-meta"><span>{u.email}</span></div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                  <select value={u.area} onChange={e => onSetArea(u.id, e.target.value)}
                    style={{ padding: '8px 10px', border: '1px solid var(--line)', borderRadius: 'var(--r-sm)', background: 'var(--bg-card)', fontSize: '13px' }}>
                    {Object.entries(G.AREAS).map(([k, a]) => <option key={k} value={k}>{a.label}</option>)}
                  </select>
                  {isMe ? (
                    <button className="btn btn-sm" disabled title="No puedes cambiar tu propio rol" style={{ opacity: .5, cursor: 'default' }}>{admin ? 'Admin' : 'Miembro'}</button>
                  ) : admin ? (
                    <button className="btn btn-sm" onClick={() => { if (confirm('¿Quitar permisos de administrador a ' + (u.full_name || u.email) + '?')) onSetRole(u.id, 'member'); }}>Quitar admin</button>
                  ) : (
                    <button className="btn btn-sm btn-primary" onClick={() => { if (confirm('¿Dar permisos de administrador a ' + (u.full_name || u.email) + '?')) onSetRole(u.id, 'admin'); }}>Hacer admin</button>
                  )}
                  {!isMe && <button className="btn btn-sm" title="Eliminar usuario" onClick={() => onDelete(u.id, u.full_name || u.email)} style={{ color: 'var(--crit)', borderColor: 'oklch(0.85 0.07 25)' }}>Eliminar</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
window.DT_HIDE_CHIP = true; // el Tablero muestra el usuario en su propia topbar
window.DT.onReady(function (profile) { root.render(<App profile={profile} />); });
</script>
</body>
</html>
